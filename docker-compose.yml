services:
  perception:
    build:
      context: .
      dockerfile: perception_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PERCEPTION_DEVICE=cpu
    volumes:
      - ./shared:/app/shared:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  reasoning:
    build:
      context: .
      dockerfile: reasoning_service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - REASONING_MODE=rules
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      perception:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5